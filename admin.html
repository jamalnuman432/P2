<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 40px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 900px; }
        h2 { margin-bottom: 20px; color: #333; text-align: center; }
        .login-box { max-width: 400px; margin: 50px auto; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-box button { width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .dashboard { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background: #4a90e2; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .error-msg { color: red; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginSection" class="login-box">
        <h2>Admin Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <p id="loginError" class="error-msg"></p>
    </div>

    <div id="dashboardSection" class="dashboard">
        <h2>Submitted Applications</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Organization</th>
                    <th>Age</th>
                    <th>City</th>
                    <th>Certificate</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const errorP = document.getElementById('loginError');

        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const result = await res.json();

            if (result.success) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                
                const tbody = document.getElementById('dataTable');
                tbody.innerHTML = '';
                result.data.forEach(app => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${app.name}</td>
                        <td>${app.organization}</td>
                        <td>${app.age}</td>
                        <td>${app.city || 'N/A'}</td>
                        <td>${app.certificate}</td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                errorP.textContent = "Invalid login details.";
            }
        } catch (err) {
            errorP.textContent = "An error occurred during login.";
        }
    });
</script>
</body>
</html>
