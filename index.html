<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .form-container { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 550px; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; font-weight: 600; }
        .input-group { margin-bottom: 20px; display: flex; align-items: center; }
        .input-group label { width: 130px; color: #666; font-size: 15px; font-weight: 500; }
        .input-group input, .input-group select { flex: 1; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; font-size: 15px; transition: all 0.3s ease; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #4a90e2; background: #fff; box-shadow: 0 0 5px rgba(74,144,226,0.1); }
        button { width: 100%; padding: 14px; background: #4a90e2; border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.3s ease; }
        button:hover { background: #357abd; }
        .msg { margin-top: 15px; text-align: center; font-size: 14px; font-weight: 500; display: none; }
        .success { color: #2e7d32; display: block; }
        .error { color: #c62828; display: block; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Personal Information</h2>
    <form id="appForm">
        <div class="input-group">
            <label for="name">Name</label>
            <input type="text" id="name" required>
        </div>
        <div class="input-group">
            <label for="organization">Organization</label>
            <input type="text" id="organization" required>
        </div>
        <div class="input-group">
            <label for="age">Age</label>
            <input type="number" id="age" required>
        </div>
        <div class="input-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="Enter your city" required>
        </div>
        <div class="input-group">
            <label for="certificate">Certificate</label>
            <select id="certificate" required>
                <option value="" disabled selected>Select Certificate</option>
                <option value="Bsc">Bsc</option>
                <option value="Msc">Msc</option>
                <option value="PhD">PhD</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <button type="submit">Submit Information</button>
        <div id="message" class="msg"></div>
    </form>
</div>

<script>
    document.getElementById('appForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgDiv = document.getElementById('message');
        
        const payload = {
            name: document.getElementById('name').value,
            organization: document.getElementById('organization').value,
            age: document.getElementById('age').value,
            certificate: document.getElementById('certificate').value,
            city: document.getElementById('city').value
        };

        try {
            const res = await fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const result = await res.json();
            if (result.success) {
                msgDiv.textContent = "Information submitted successfully!";
                msgDiv.className = "msg success";
                document.getElementById('appForm').reset();
            } else {
                msgDiv.textContent = "Submission failed.";
                msgDiv.className = "msg error";
            }
        } catch (err) {
            msgDiv.textContent = "Submission failed.";
            msgDiv.className = "msg error";
        }
    });
</script>
</body>
</html>
